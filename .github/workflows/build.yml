name: Build OpenWrt RM2100

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download ImageBuilder
      run: |
        wget https://downloads.openwrt.org/releases/23.05.6/targets/ramips/mt7621/openwrt-imagebuilder-23.05.6-ramips-mt7621.Linux-x86_64.tar.xz
        tar -xf openwrt-imagebuilder-23.05.6-ramips-mt7621.Linux-x86_64.tar.xz

    - name: Build firmware
      run: |
        cd openwrt-imagebuilder-23.05.6-ramips-mt7621.Linux-x86_64
        make image PROFILE="xiaomi_redmi-router-ac2100" PACKAGES="
        luci
        luci-i18n-base-zh-cn
        ppp
        ppp-mod-pppoe
        kmod-usb3
        "

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: RM2100-OpenWrt
        path: openwrt-imagebuilder-*/bin/targets/ramips/mt7621/*
